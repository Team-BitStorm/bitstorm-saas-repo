<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitHealth — Home medical visits marketplace</title>
    <meta
      name="description"
      content="Discover therapists and medical providers for home visits. Accessible, multi-language marketplace."
    />
    <meta name="author" content="BitHealth" />
    <meta property="og:title" content="BitHealth — Home medical visits marketplace" />
    <meta
      property="og:description"
      content="Book home visits with trusted medical providers near you."
    />
    <script>
      (function () {
        var key = "bithealth_theme";
        var stored = localStorage.getItem(key);
        var mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
        var dark =
          mode === "dark" ||
          (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      })();
    </script>
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
